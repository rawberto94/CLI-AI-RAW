apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "contigo.fullname" . }}-config
  labels:
    {{- include "contigo.labels" . | nindent 4 }}
data:
  {{- range $key, $value := .Values.env }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- if not (hasKey .Values.env "NEXTAUTH_URL") }}
  NEXTAUTH_URL: {{ printf "https://%s" .Values.ingress.host | quote }}
  {{- end }}
  {{- if not (hasKey .Values.env "NEXT_PUBLIC_APP_URL") }}
  NEXT_PUBLIC_APP_URL: {{ printf "https://%s" .Values.ingress.host | quote }}
  {{- end }}
  {{- if not (hasKey .Values.env "NEXT_PUBLIC_WS_URL") }}
  NEXT_PUBLIC_WS_URL: {{ printf "wss://%s/ws" .Values.ingress.host | quote }}
  {{- end }}
