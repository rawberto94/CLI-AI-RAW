{{- if .Values.azure.enabled }}
# Azure Key Vault SecretProviderClass
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ include "contigo.fullname" . }}-secrets
  labels:
    {{- include "contigo.labels" . | nindent 4 }}
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    keyvaultName: {{ .Values.azure.keyVaultName | quote }}
    tenantId: {{ .Values.azure.tenantId | quote }}
    objects: |
      array:
{{ range .Values.secrets.keyVaultObjects }}
        - |
          objectName: {{ .objectName }}
          objectType: secret
{{ end }}
  secretObjects:
    - secretName: {{ include "contigo.fullname" . }}-secrets
      type: Opaque
      data:
        {{- range .Values.secrets.keyVaultObjects }}
        {{- $objectName := .objectName }}
        {{- range .keys }}
        - objectName: {{ $objectName }}
          key: {{ . }}
        {{- end }}
        {{- end }}
{{- else }}
# Manual Kubernetes Secret (for non-Azure deployments)
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "contigo.fullname" . }}-secrets
  labels:
    {{- include "contigo.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $key, $value := .Values.secrets.manual }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
