{{- if .Values.azure.enabled }}
# Azure Key Vault SecretProviderClass
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ include "contigo.fullname" . }}-secrets
  labels:
    {{- include "contigo.labels" . | nindent 4 }}
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    keyvaultName: {{ .Values.azure.keyVaultName | quote }}
    tenantId: {{ .Values.azure.tenantId | quote }}
    objects: |
      array:
{{ range .Values.secrets.keyVaultObjects }}
        - |
          objectName: {{ .objectName }}
          objectType: secret
{{ end }}
  secretObjects:
    - secretName: {{ include "contigo.fullname" . }}-secrets
      type: Opaque
      data:
        {{- range .Values.secrets.keyVaultObjects }}
        {{- $objectName := .objectName }}
        {{- range .keys }}
        - objectName: {{ $objectName }}
          key: {{ . }}
        {{- end }}
        {{- end }}
{{- else }}
# Manual Kubernetes Secret (for non-Azure deployments)
{{- $requireManualValues := and (not .Values.azure.enabled) (eq (toString .Values.env.NODE_ENV) "production") (.Values.secrets.requireManualValues | default true) }}
{{- $requiredManualKeys := .Values.secrets.requiredManualKeys | default list }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "contigo.fullname" . }}-secrets
  labels:
    {{- include "contigo.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $key, $value := .Values.secrets.manual }}
  {{- if and $requireManualValues (has $key $requiredManualKeys) }}
  {{ $key }}: {{ required (printf "secrets.manual.%s is required when azure.enabled=false and NODE_ENV=production" $key) $value | quote }}
  {{- else }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- end }}
{{- end }}
