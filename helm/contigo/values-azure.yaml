# Azure Production Values - Switzerland North
# Cost-optimized configuration

replicaCount: 2

image:
  repository: acrcontigoprod.azurecr.io/contigo-web
  tag: latest
  pullPolicy: Always

web:
  replicaCount: 2
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

workers:
  replicaCount: 2
  image:
    repository: acrcontigoprod.azurecr.io/contigo-workers
    tag: latest
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

websocket:
  replicaCount: 1
  image:
    repository: acrcontigoprod.azurecr.io/contigo-websocket
    tag: latest
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

service:
  type: ClusterIP
  port: 3000
  websocketPort: 3001

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/websocket-services: contigo-websocket
  # UPDATE THIS with your domain
  host: contigo.yourdomain.ch
  tls:
    enabled: true
    secretName: contigo-tls

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

env:
  NODE_ENV: production
  LOG_LEVEL: info
  PORT: "3000"
  NEXT_TELEMETRY_DISABLED: "1"
  AUTH_TRUST_HOST: "true"
  REQUIRE_AUTH: "true"
  ENABLE_AI_FEATURES: "true"
  ENABLE_HEALTH_CHECKS: "true"
  RAG_INTEGRATION_ENABLED: "true"
  RAG_AUTO_INDEX: "true"
  RAG_EMBED_MODEL: text-embedding-3-small
  RAG_EMBED_DIMENSIONS: "1024"
  RAG_RETRIEVAL_K: "8"
  AZURE_OPENAI_DEPLOYMENT: gpt-4o
  AZURE_OPENAI_EMBEDDING_DEPLOYMENT: text-embedding-3-small
  AZURE_OPENAI_API_VERSION: "2024-02-01"
  AZURE_DI_DEFAULT_MODEL: layout
  AZURE_DI_FEATURES: keyValuePairs
  STORAGE_PROVIDER: minio
  MINIO_PORT: "9000"
  MINIO_BUCKET: contracts
  MINIO_USE_SSL: "false"
  S3_BUCKET: contracts
  S3_REGION: us-east-1
  S3_USE_SSL: "false"
  AZURE_STORAGE_CONTAINER: contracts
  AZURE_STORAGE_CONTAINER_NAME: contracts
  AZURE_STORAGE_REGION: switzerlandnorth

# Azure Key Vault integration
azure:
  enabled: true
  keyVaultName: kv-contigo-prod
  tenantId: ""  # Set via --set azure.tenantId=xxx
  storageAccount: stcontigoprod
  storageContainer: contracts

externalSecrets:
  enabled: true
