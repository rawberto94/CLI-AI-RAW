# PgBouncer Connection Pooling Configuration
# Provides connection pooling for PostgreSQL to handle
# high-concurrency workloads efficiently.

version: '3.8'

services:
  # PgBouncer Connection Pooler
  pgbouncer:
    image: edoburu/pgbouncer:1.21.0
    container_name: contract-intelligence-pgbouncer
    restart: unless-stopped
    environment:
      # Database configuration
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/contract_intelligence
      
      # PgBouncer settings
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 50
      MIN_POOL_SIZE: 10
      RESERVE_POOL_SIZE: 25
      RESERVE_POOL_TIMEOUT: 5
      MAX_DB_CONNECTIONS: 100
      MAX_USER_CONNECTIONS: 100
      
      # Authentication
      AUTH_TYPE: scram-sha-256
      AUTH_FILE: /etc/pgbouncer/userlist.txt
      
      # Logging
      LOG_CONNECTIONS: 1
      LOG_DISCONNECTIONS: 1
      LOG_POOLER_ERRORS: 1
      
      # Timeouts
      SERVER_IDLE_TIMEOUT: 600
      SERVER_LIFETIME: 3600
      SERVER_CONNECT_TIMEOUT: 15
      CLIENT_IDLE_TIMEOUT: 0
      CLIENT_LOGIN_TIMEOUT: 60
      QUERY_TIMEOUT: 0
      QUERY_WAIT_TIMEOUT: 120
      
      # Admin settings
      ADMIN_USERS: postgres
      STATS_USERS: postgres
      
    volumes:
      - ./pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    ports:
      - "6432:6432"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-p", "6432", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - contract-intelligence

volumes:
  pgbouncer_config:

networks:
  contract-intelligence:
    external: true
