version: '3.8'

# Lightweight compose for low-memory VMs (1 GiB + 2 GiB swap)
# Optimized for ConTigoVM (Standard B2ats v2)
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: contigo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: contract_intelligence
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init/01-enable-extensions.sql:/docker-entrypoint-initdb.d/01-enable-extensions.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d contract_intelligence"]
      interval: 30s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    command: >
      postgres
        -c shared_buffers=64MB
        -c work_mem=4MB
        -c maintenance_work_mem=32MB
        -c effective_cache_size=128MB
        -c max_connections=50
    networks:
      - contigo

  redis:
    image: redis:7-alpine
    container_name: contigo-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy noeviction --save 60 1000
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 96M
    networks:
      - contigo

  minio:
    image: minio/minio:latest
    container_name: contigo-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:?S3_ACCESS_KEY must be set}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?S3_SECRET_KEY must be set}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 60s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - contigo

  web:
    image: ghcr.io/rawberto94/cli-ai-raw/web:latest
    container_name: contigo-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/contract_intelligence
      DIRECT_DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/contract_intelligence
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${S3_ACCESS_KEY:?S3_ACCESS_KEY must be set}
      MINIO_SECRET_KEY: ${S3_SECRET_KEY:?S3_SECRET_KEY must be set}
      MINIO_BUCKET: ${S3_BUCKET:-contracts}
      MINIO_USE_SSL: "false"
      AUTH_SECRET: ${AUTH_SECRET:-change-me-in-production}
      AUTH_TRUST_HOST: "true"
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://mycontigo.app}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "80:3000"
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - contigo

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

networks:
  contigo:
    driver: bridge
