name: Performance & Quality Checks

on:
  pull_request:
    paths:
      - 'apps/web/**'
      - 'lighthouserc.json'
  push:
    branches: [ main ]
    paths:
      - 'apps/web/**'
      - 'lighthouserc.json'

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Build-time placeholders (same pattern as deploy.yml) — page-data
      # collection validates the Prisma datasource URL without connecting.
      DATABASE_URL: postgresql://user:pass@localhost:5432/test
      DIRECT_DATABASE_URL: postgresql://user:pass@localhost:5432/test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.16.1
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate Prisma Client
        run: pnpm run db:generate
      - name: Build web app (and workspace package deps)
        run: pnpm exec turbo run build --filter=web
      - name: Run Lighthouse CI
        run: pnpm lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}