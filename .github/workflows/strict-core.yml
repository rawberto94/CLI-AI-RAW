name: Strict Core Type Check

# Phase 1 of progressive strict rollout. See STRICT_ROLLOUT.md for details.

on:
  pull_request:
    paths:
      - 'apps/web/**'
      - '.github/workflows/strict-core.yml'
      - 'package.json'
      - 'apps/web/tsconfig.strict-core.json'
  push:
    branches: [ main ]
    paths:
      - 'apps/web/**'
      - '.github/workflows/strict-core.yml'
      - 'package.json'
      - 'apps/web/tsconfig.strict-core.json'

jobs:
  typecheck-web-strict-core:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    # Advisory: the strict baseline has ~4k pre-existing violations (progressive
    # rollout — see tsconfig.strict-core.json). Signal is reported, main stays green.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.16.1
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate Prisma Client
        run: pnpm run db:generate
      # Report-only until the strict rollout baseline reaches zero errors —
      # the error list stays visible in the step log without failing the job.
      - name: Core strict type check (report-only)
        continue-on-error: true
        run: pnpm type-check:web:strict:core
