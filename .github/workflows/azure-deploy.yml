name: Azure Deploy

# Compatibility entrypoint that forwards to the canonical Azure Container Apps workflow.
on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        default: production
        type: choice
        options:
          - staging
          - production
      version:
        description: Optional image tag override (e.g. v1.0.5)
        required: false
        default: ''
      confirm_production:
        description: Type 'deploy-production' to confirm
        required: true

jobs:
  deploy:
    uses: ./.github/workflows/deploy-container-apps.yml
    with:
      environment: ${{ inputs.environment }}
      version: ${{ inputs.version }}
      confirm_production: ${{ inputs.confirm_production }}
    secrets: inherit
