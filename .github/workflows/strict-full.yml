name: Full Strict Type Check (Manual / Optional)

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for running full strict type check"
        required: false
  pull_request:
    types: [labeled, synchronize]
    paths:
      - 'apps/web/**'
      - 'package.json'
      - 'apps/web/tsconfig.strict.json'

jobs:
  full-strict:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'run-full-strict')
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.16.1
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate Prisma Client
        run: pnpm run db:generate
      # Report-only baseline for the progressive strict rollout — error lists
      # stay visible in the step logs without failing the job.
      - name: Core strict (report-only baseline)
        continue-on-error: true
        run: pnpm type-check:web:strict:core
      - name: Full strict web (report-only baseline)
        continue-on-error: true
        run: pnpm type-check:web:strict:full
