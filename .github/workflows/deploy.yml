name: Build and Deploy Agentic AI Platform

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_WEB: ${{ github.repository }}/web
  IMAGE_NAME_WORKERS: ${{ github.repository }}/workers

jobs:
  # Type checking and linting
  quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
          
      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT
        
      - uses: actions/cache@v3
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-
          
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        
      - name: Lint
        run: cd apps/web && pnpm lint
        continue-on-error: true
        
      - name: Type check (core)
        run: cd apps/web && pnpm type-check
        continue-on-error: true

  # Build and test
  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
          
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        
      - name: Generate Prisma Client
        run: cd packages/clients/db && pnpm prisma generate
        
      - name: Build application
        run: cd apps/web && NODE_OPTIONS="--max-old-space-size=16384" pnpm build
        env:
          NEXT_BUILD: true
          LOG_LEVEL: silent
          DATABASE_URL: postgresql://user:pass@localhost:5432/test
          DIRECT_DATABASE_URL: postgresql://user:pass@localhost:5432/test
          SKIP_ENV_VALIDATION: true
        continue-on-error: true
        
      - name: Check if agent routes built
        run: |
          if [ -d "apps/web/.next/server/app/api/agents" ]; then
            echo "✅ Agent routes compiled successfully"
            ls -la apps/web/.next/server/app/api/agents/
            exit 0
          else
            echo "❌ Agent routes not found"
            exit 1
          fi

  # Database migration check
  migration-check:
    name: Database Migration Check
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
          
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
          
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        
      - name: Run migrations
        run: cd packages/clients/db && pnpm prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test
          DIRECT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test
          
      - name: Verify agent tables
        run: |
          cd packages/clients/db
          npx prisma db execute --sql "
            SELECT tablename FROM pg_tables 
            WHERE schemaname='public' 
            AND (tablename LIKE 'agent%' OR tablename = 'learning_records' OR tablename = 'opportunity_discoveries')
          " --url="postgresql://postgres:postgres@localhost:5432/test"
          echo "✅ Agent tables verified"

  # Build Docker images
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [build, migration-check]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging')
    
    permissions:
      contents: read
      packages: write
      
    steps:
      - uses: actions/checkout@v4
      
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Extract metadata (web)
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_WEB }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            
      - name: Build and push web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          build-args: |
            NODE_ENV=production
          cache-from: type=gha
          cache-to: type=gha,mode=max
          
      - name: Extract metadata (workers)
        id: meta-workers
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_WORKERS }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            
      - name: Build and push workers image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.workers
          push: true
          tags: ${{ steps.meta-workers.outputs.tags }}
          labels: ${{ steps.meta-workers.outputs.labels }}
          build-args: |
            NODE_ENV=production
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy to staging (AWS ECS example)
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/staging'
    environment:
      name: staging
      url: https://staging.yourapp.com
      
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
          
      - name: Run database migrations
        run: |
          # Run migration task in ECS
          aws ecs run-task \
            --cluster contract-intelligence-staging \
            --task-definition migration-task-staging \
            --network-configuration "awsvpcConfiguration={subnets=[${{ secrets.STAGING_SUBNET }}],securityGroups=[${{ secrets.STAGING_SG }}]}" \
            --overrides '{"containerOverrides": [{"name": "migrator", "command": ["npx", "prisma", "migrate", "deploy"]}]}'
            
      - name: Update ECS service (web)
        run: |
          aws ecs update-service \
            --cluster contract-intelligence-staging \
            --service web \
            --force-new-deployment
            
      - name: Update ECS service (workers)
        run: |
          aws ecs update-service \
            --cluster contract-intelligence-staging \
            --service workers \
            --force-new-deployment
            
      - name: Wait for deployment
        run: |
          aws ecs wait services-stable \
            --cluster contract-intelligence-staging \
            --services web workers

  # Deploy to production (AWS ECS example)
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://app.yourapp.com
      
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
          
      - name: Run database migrations
        run: |
          aws ecs run-task \
            --cluster contract-intelligence-prod \
            --task-definition migration-task-prod \
            --network-configuration "awsvpcConfiguration={subnets=[${{ secrets.PROD_SUBNET }}],securityGroups=[${{ secrets.PROD_SG }}]}" \
            --overrides '{"containerOverrides": [{"name": "migrator", "command": ["npx", "prisma", "migrate", "deploy"]}]}'
            
      - name: Update ECS service (web) - Blue/Green
        run: |
          # Get current task definition
          TASK_DEFINITION=$(aws ecs describe-services --cluster contract-intelligence-prod --services web --query 'services[0].taskDefinition' --output text)
          
          # Update with new image
          aws ecs update-service \
            --cluster contract-intelligence-prod \
            --service web \
            --task-definition $TASK_DEFINITION \
            --force-new-deployment
            
      - name: Update ECS service (workers)
        run: |
          aws ecs update-service \
            --cluster contract-intelligence-prod \
            --service workers \
            --force-new-deployment \
            --desired-count 3
            
      - name: Wait for stable deployment
        run: |
          aws ecs wait services-stable \
            --cluster contract-intelligence-prod \
            --services web workers
            
      - name: Verify deployment
        run: |
          # Check health endpoint
          response=$(curl -s -o /dev/null -w "%{http_code}" https://app.yourapp.com/api/health)
          if [ $response -eq 200 ]; then
            echo "✅ Health check passed"
          else
            echo "❌ Health check failed with status $response"
            exit 1
          fi
          
          # Check agent status
          response=$(curl -s -o /dev/null -w "%{http_code}" https://app.yourapp.com/api/agents/status)
          if [ $response -eq 200 ]; then
            echo "✅ Agent routes accessible"
          else
            echo "❌ Agent routes failed with status $response"
            exit 1
          fi
          
      - name: Notify deployment success
        if: success()
        run: |
          echo "🚀 Production deployment successful!"
          echo "Web: https://app.yourapp.com"
          echo "Agents: https://app.yourapp.com/api/agents/status"
          
      - name: Rollback on failure
        if: failure()
        run: |
          echo "❌ Deployment failed, initiating rollback..."
          # Rollback to previous task definition
          aws ecs update-service \
            --cluster contract-intelligence-prod \
            --service web \
            --force-new-deployment

  # Performance tests (optional)
  performance-test:
    name: Performance Testing
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/staging'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Run load tests
        run: |
          # Example using k6
          docker run --rm -i grafana/k6 run - <tests/load-test.js
        continue-on-error: true

  # Security scan
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_WEB }}:latest
          format: 'sarif'
          output: 'trivy-results.sarif'
          
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'
