# ==============================================
# Kubernetes Namespace for ConTigo Platform
# ==============================================
apiVersion: v1
kind: Namespace
metadata:
  name: contigo
  labels:
    app.kubernetes.io/name: contigo
    app.kubernetes.io/part-of: contigo-platform
---
# Resource Quotas
apiVersion: v1
kind: ResourceQuota
metadata:
  name: contigo-quota
  namespace: contigo
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 16Gi
    limits.cpu: "16"
    limits.memory: 32Gi
    pods: "20"
---
# Limit Ranges
apiVersion: v1
kind: LimitRange
metadata:
  name: contigo-limits
  namespace: contigo
spec:
  limits:
    - default:
        cpu: "500m"
        memory: 512Mi
      defaultRequest:
        cpu: "100m"
        memory: 128Mi
      type: Container
