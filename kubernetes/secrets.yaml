# ==============================================
# Secrets Template for ConTigo Platform
# ==============================================
# IMPORTANT: Do not commit actual secrets!
# Use Azure Key Vault or sealed-secrets in production
#
# For Azure Key Vault integration, use SecretProviderClass instead
# https://docs.microsoft.com/azure/aks/csi-secrets-store-driver
# ==============================================

apiVersion: v1
kind: Secret
metadata:
  name: contigo-secrets
  namespace: contigo
  labels:
    app.kubernetes.io/name: contigo
type: Opaque
stringData:
  # Database (from Azure Key Vault)
  DATABASE_URL: "postgresql://contigoadmin:PASSWORD@psql-contigo-prod.postgres.database.azure.com:5432/contigo?sslmode=require"
  
  # Redis (from Azure Key Vault)
  REDIS_URL: "rediss://:KEY@redis-contigo-prod.redis.cache.windows.net:6380"
  
  # NextAuth
  NEXTAUTH_SECRET: "generate-with-openssl-rand-base64-32"
  
  # AI Services
  OPENAI_API_KEY: "sk-your-key"
  
  # Azure Storage
  AZURE_STORAGE_CONNECTION_STRING: "DefaultEndpointsProtocol=https;AccountName=stcontigoprod;AccountKey=KEY;EndpointSuffix=core.windows.net"
  
  # Email
  SENDGRID_API_KEY: "SG.your-key"

---
# Azure Key Vault integration (recommended for production)
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: contigo-keyvault
  namespace: contigo
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: ""  # Set via deployment
    keyvaultName: "kv-contigo-prod"
    tenantId: ""  # Set via deployment
    objects: |
      array:
        - |
          objectName: database-url
          objectType: secret
        - |
          objectName: redis-url
          objectType: secret
        - |
          objectName: nextauth-secret
          objectType: secret
        - |
          objectName: openai-api-key
          objectType: secret
        - |
          objectName: storage-connection-string
          objectType: secret
        - |
          objectName: sendgrid-api-key
          objectType: secret
  secretObjects:
    - secretName: contigo-secrets-synced
      type: Opaque
      data:
        - objectName: database-url
          key: DATABASE_URL
        - objectName: redis-url
          key: REDIS_URL
        - objectName: nextauth-secret
          key: NEXTAUTH_SECRET
        - objectName: openai-api-key
          key: OPENAI_API_KEY
        - objectName: storage-connection-string
          key: AZURE_STORAGE_CONNECTION_STRING
        - objectName: sendgrid-api-key
          key: SENDGRID_API_KEY
