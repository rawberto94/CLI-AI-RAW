<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <defs>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2DD4BF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F766E;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Document Icon -->
  <g transform="translate(5, 5)">
    <!-- Document body -->
    <rect x="5" y="0" width="55" height="70" rx="8" ry="8" fill="none" stroke="url(#iconGradient)" stroke-width="4"/>
    <!-- Document lines -->
    <line x1="18" y1="18" x2="48" y2="18" stroke="url(#iconGradient)" stroke-width="3" stroke-linecap="round"/>
    <line x1="18" y1="32" x2="48" y2="32" stroke="url(#iconGradient)" stroke-width="3" stroke-linecap="round"/>
    <line x1="18" y1="46" x2="38" y2="46" stroke="url(#iconGradient)" stroke-width="3" stroke-linecap="round"/>
    <!-- Pen -->
    <g transform="translate(40, 48) rotate(-45)">
      <rect x="0" y="0" width="8" height="28" rx="2" fill="url(#iconGradient)"/>
      <polygon points="0,28 4,38 8,28" fill="url(#iconGradient)"/>
    </g>
  </g>
</svg>
