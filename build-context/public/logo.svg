<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 70">
  <defs>
    <linearGradient id="docGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2DD4BF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D7377;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="penGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D7377;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A5558;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Document Icon -->
  <g transform="translate(5, 8)">
    <!-- Document body with rounded corners -->
    <rect x="0" y="0" width="42" height="52" rx="8" ry="8" fill="url(#docGradient)"/>
    <!-- Text lines -->
    <rect x="8" y="12" width="20" height="4" rx="2" fill="white"/>
    <rect x="8" y="22" width="26" height="4" rx="2" fill="white"/>
    <!-- Pen/pencil -->
    <g transform="translate(28, 32) rotate(-45)">
      <rect x="-3" y="0" width="8" height="28" rx="1" fill="url(#penGradient)"/>
      <polygon points="-3,28 1,38 5,28" fill="url(#penGradient)"/>
      <rect x="-2" y="2" width="6" height="3" fill="#0A5558"/>
    </g>
  </g>
  
  <!-- Text: ConTigo -->
  <text x="65" y="48" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="38" font-weight="700" fill="#0C4A6E" letter-spacing="-1">
    ConTigo
  </text>
</svg>
