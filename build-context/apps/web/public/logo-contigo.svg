<svg width="200" height="60" viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Three Stacked Bars Icon -->
  <g transform="translate(0, 12)">
    <rect x="0" y="0" width="28" height="8" rx="4" fill="#6D28D9"/>
    <rect x="0" y="13" width="28" height="8" rx="4" fill="#8B5CF6"/>
    <rect x="0" y="26" width="28" height="8" rx="4" fill="#C4B5FD"/>
  </g>
  <!-- Text: "contigo" — con bold + tigo light -->
  <text x="40" y="42" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="32" letter-spacing="-0.5">
    <tspan fill="#6D28D9" font-weight="700">con</tspan><tspan fill="#0F172A" font-weight="300">tigo</tspan>
  </text>
</svg>
