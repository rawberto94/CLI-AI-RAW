{{- if .Values.azure.enabled }}
# Azure Key Vault SecretProviderClass
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ include "contigo.fullname" . }}-secrets
  labels:
    {{- include "contigo.labels" . | nindent 4 }}
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    keyvaultName: {{ .Values.azure.keyVaultName | quote }}
    tenantId: {{ .Values.azure.tenantId | quote }}
    objects: |
      array:
        - |
          objectName: database-url
          objectType: secret
        - |
          objectName: redis-url
          objectType: secret
        - |
          objectName: nextauth-secret
          objectType: secret
        - |
          objectName: encryption-key
          objectType: secret
        - |
          objectName: azure-storage-key
          objectType: secret
        - |
          objectName: openai-api-key
          objectType: secret
  secretObjects:
    - secretName: {{ include "contigo.fullname" . }}-secrets
      type: Opaque
      data:
        - objectName: database-url
          key: DATABASE_URL
        - objectName: redis-url
          key: REDIS_URL
        - objectName: nextauth-secret
          key: NEXTAUTH_SECRET
        - objectName: encryption-key
          key: ENCRYPTION_KEY
        - objectName: azure-storage-key
          key: AZURE_STORAGE_KEY
        - objectName: openai-api-key
          key: OPENAI_API_KEY
{{- else }}
# Manual Kubernetes Secret (for non-Azure deployments)
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "contigo.fullname" . }}-secrets
  labels:
    {{- include "contigo.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/contigo"
  REDIS_URL: "redis://redis:6379"
  NEXTAUTH_SECRET: "change-me-in-production"
  ENCRYPTION_KEY: "change-me-in-production-32chars"
{{- end }}
