name: Azure Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging

env:
  AZURE_RESOURCE_GROUP: contigo-prod-rg
  AKS_CLUSTER_NAME: contigo-prod-aks
  ACR_NAME: contigoprodacr
  HELM_RELEASE: contigo

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.prep.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare tags
        id: prep
        run: |
          TAG=sha-${GITHUB_SHA::8}
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: |
          az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.ACR_NAME }}.azurecr.io/contigo-web:${{ steps.prep.outputs.tag }}
            ${{ env.ACR_NAME }}.azurecr.io/contigo-web:latest
          cache-from: type=registry,ref=${{ env.ACR_NAME }}.azurecr.io/contigo-web:buildcache
          cache-to: type=registry,ref=${{ env.ACR_NAME }}.azurecr.io/contigo-web:buildcache,mode=max
          build-args: |
            NODE_ENV=production

      - name: Build and push workers image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.workers
          push: true
          tags: |
            ${{ env.ACR_NAME }}.azurecr.io/contigo-workers:${{ steps.prep.outputs.tag }}
            ${{ env.ACR_NAME }}.azurecr.io/contigo-workers:latest
          cache-from: type=registry,ref=${{ env.ACR_NAME }}.azurecr.io/contigo-workers:buildcache
          cache-to: type=registry,ref=${{ env.ACR_NAME }}.azurecr.io/contigo-workers:buildcache,mode=max

      - name: Build and push websocket image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.websocket
          push: true
          tags: |
            ${{ env.ACR_NAME }}.azurecr.io/contigo-websocket:${{ steps.prep.outputs.tag }}
            ${{ env.ACR_NAME }}.azurecr.io/contigo-websocket:latest
          cache-from: type=registry,ref=${{ env.ACR_NAME }}.azurecr.io/contigo-websocket:buildcache
          cache-to: type=registry,ref=${{ env.ACR_NAME }}.azurecr.io/contigo-websocket:buildcache,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS Credentials
        run: |
          az aks get-credentials --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --name ${{ env.AKS_CLUSTER_NAME }}

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: "latest"

      - name: Deploy with Helm
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE }} ./helm/contigo \
            -f ./helm/contigo/values-azure.yaml \
            --namespace contigo \
            --create-namespace \
            --set image.tag=${{ needs.build.outputs.image-tag }} \
            --set image.repository=${{ env.ACR_NAME }}.azurecr.io/contigo-web \
            --set workers.image.repository=${{ env.ACR_NAME }}.azurecr.io/contigo-workers \
            --set workers.image.tag=${{ needs.build.outputs.image-tag }} \
            --set websocket.image.repository=${{ env.ACR_NAME }}.azurecr.io/contigo-websocket \
            --set websocket.image.tag=${{ needs.build.outputs.image-tag }} \
            --wait --timeout 10m

      - name: Verify Deployment
        run: |
          kubectl rollout status deployment/contigo-web -n contigo --timeout=5m
          kubectl rollout status deployment/contigo-workers -n contigo --timeout=5m
          kubectl rollout status deployment/contigo-websocket -n contigo --timeout=5m

  notify:
    needs: [build, deploy]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Notify on success
        if: needs.deploy.result == 'success'
        run: |
          echo "✅ Deployment successful! Image tag: ${{ needs.build.outputs.image-tag }}"

      - name: Notify on failure
        if: needs.deploy.result == 'failure'
        run: |
          echo "❌ Deployment failed!"
          exit 1
