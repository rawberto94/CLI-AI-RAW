# Nginx Load Balancer Configuration for Contigo Platform
# 
# This configuration provides:
# - SSL termination with modern cipher suites
# - Load balancing with health checks
# - Rate limiting at the edge
# - WebSocket support
# - Compression and caching
# - Security headers

# Upstream definitions
upstream contigo_web {
    least_conn;
    keepalive 64;
    
    # Application servers - adjust IPs/ports as needed
    server app1.internal:3000 weight=1 max_fails=3 fail_timeout=30s;
    server app2.internal:3000 weight=1 max_fails=3 fail_timeout=30s;
    server app3.internal:3000 weight=1 max_fails=3 fail_timeout=30s backup;
}

upstream contigo_websocket {
    ip_hash;  # Sticky sessions for WebSocket
    
    server ws1.internal:3001 max_fails=3 fail_timeout=30s;
    server ws2.internal:3001 max_fails=3 fail_timeout=30s;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=general:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=api:10m rate=50r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# Cache configuration
proxy_cache_path /var/cache/nginx/contigo 
    levels=1:2 
    keys_zone=contigo_cache:100m 
    max_size=10g 
    inactive=60m 
    use_temp_path=off;

# Logging format with request timing
log_format contigo_json escape=json '{'
    '"time":"$time_iso8601",'
    '"remote_addr":"$remote_addr",'
    '"request_id":"$request_id",'
    '"request":"$request",'
    '"status":$status,'
    '"body_bytes_sent":$body_bytes_sent,'
    '"request_time":$request_time,'
    '"upstream_response_time":"$upstream_response_time",'
    '"http_referrer":"$http_referer",'
    '"http_user_agent":"$http_user_agent",'
    '"http_x_forwarded_for":"$http_x_forwarded_for"'
'}';

# HTTP server - redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name contigo.app www.contigo.app api.contigo.app;
    
    # Allow health checks over HTTP
    location /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }
    
    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server - main application
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name contigo.app www.contigo.app;
    
    # SSL Configuration
    ssl_certificate /etc/nginx/ssl/contigo.app.crt;
    ssl_certificate_key /etc/nginx/ssl/contigo.app.key;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    
    # Modern SSL settings (TLS 1.2+)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    
    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/nginx/ssl/chain.pem;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;
    
    # Logging
    access_log /var/log/nginx/contigo_access.log contigo_json;
    error_log /var/log/nginx/contigo_error.log warn;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    
    # Request ID for tracing
    set $request_id $request_id;
    if ($http_x_request_id) {
        set $request_id $http_x_request_id;
    }
    
    # Connection limits
    limit_conn conn_limit 100;
    
    # Client body size (for file uploads)
    client_max_body_size 50M;
    client_body_timeout 60s;
    client_header_timeout 60s;
    
    # Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;
    
    # Static assets with aggressive caching
    location /_next/static/ {
        proxy_pass http://contigo_web;
        proxy_cache contigo_cache;
        proxy_cache_valid 200 365d;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Cache-Status $upstream_cache_status;
    }
    
    # Public assets
    location /public/ {
        proxy_pass http://contigo_web;
        proxy_cache contigo_cache;
        proxy_cache_valid 200 7d;
        
        add_header Cache-Control "public, max-age=604800";
    }
    
    # Health check endpoint
    location /api/health {
        proxy_pass http://contigo_web;
        access_log off;
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
    }
    
    # Authentication endpoints - strict rate limiting
    location ~ ^/api/auth/(signin|signup|reset-password) {
        limit_req zone=auth burst=10 nodelay;
        
        proxy_pass http://contigo_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
    }
    
    # API endpoints
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        
        proxy_pass http://contigo_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 300s;  # Longer for AI operations
        
        # Disable buffering for streaming responses
        proxy_buffering off;
    }
    
    # WebSocket endpoint
    location /ws {
        proxy_pass http://contigo_websocket;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-ID $request_id;
        
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }
    
    # Default - application routes
    location / {
        limit_req zone=general burst=100 nodelay;
        
        proxy_pass http://contigo_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header Connection "";
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Enable keepalive
        proxy_set_header Connection "";
    }
    
    # Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}

# API subdomain (if using separate subdomain)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.contigo.app;
    
    # Same SSL config as main server
    ssl_certificate /etc/nginx/ssl/contigo.app.crt;
    ssl_certificate_key /etc/nginx/ssl/contigo.app.key;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    
    # Logging
    access_log /var/log/nginx/api_access.log contigo_json;
    error_log /var/log/nginx/api_error.log warn;
    
    # CORS headers for API
    add_header Access-Control-Allow-Origin "https://contigo.app" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID, X-API-Version" always;
    add_header Access-Control-Max-Age 86400 always;
    
    # Handle preflight requests
    if ($request_method = OPTIONS) {
        return 204;
    }
    
    # API rate limiting
    limit_req zone=api burst=100 nodelay;
    
    location / {
        proxy_pass http://contigo_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        
        proxy_connect_timeout 60s;
        proxy_read_timeout 300s;
    }
}

# Status endpoint for monitoring (internal only)
server {
    listen 8080;
    server_name localhost;
    
    location /nginx_status {
        stub_status on;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
    }
    
    location /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
