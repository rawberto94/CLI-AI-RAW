version: '3.8'

services:
  # PostgreSQL Database - Staging
  postgres:
    image: pgvector/pgvector:pg16
    container_name: contract-intelligence-postgres-staging
    restart: unless-stopped
    environment:
      POSTGRES_DB: contract_intelligence_staging
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-staging_password}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
      - ./init/01-enable-extensions.sql:/docker-entrypoint-initdb.d/01-enable-extensions.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d contract_intelligence_staging"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - contract-intelligence-staging

  # Redis for BullMQ - Staging
  redis:
    image: redis:7-alpine
    container_name: contract-intelligence-redis-staging
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_staging_data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - contract-intelligence-staging

  # MinIO for S3-compatible storage - Staging
  minio:
    image: minio/minio:latest
    container_name: contract-intelligence-minio-staging
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-staging_minio}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-staging_minio_secret}
    volumes:
      - minio_staging_data:/data
    ports:
      - "9002:9000"
      - "9003:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - contract-intelligence-staging

  # Web Application - Staging
  web:
    build:
      context: .
      dockerfile: Dockerfile.staging
      args:
        NODE_ENV: staging
    container_name: contract-intelligence-web-staging
    restart: unless-stopped
    environment:
      NODE_ENV: staging
      PORT: 3000
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-staging_password}@postgres:5432/contract_intelligence_staging?connection_limit=10&pool_timeout=20
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-contracts-staging}
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY:-staging_minio}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY:-staging_minio_secret}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      ANALYSIS_USE_LLM: ${ANALYSIS_USE_LLM:-true}
      RAG_ENABLED: ${RAG_ENABLED:-true}
      JWT_SECRET: ${JWT_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      SENTRY_DSN: ${SENTRY_DSN:-}
      ENABLE_HEALTH_CHECKS: true
      ENABLE_MONITORING: true
      ENABLE_PERFORMANCE_TRACKING: true
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - contract-intelligence-staging
    volumes:
      - app_staging_logs:/app/logs
      - ./uploads:/app/uploads

volumes:
  postgres_staging_data:
    driver: local
  redis_staging_data:
    driver: local
  minio_staging_data:
    driver: local
  app_staging_logs:
    driver: local

networks:
  contract-intelligence-staging:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16
