#       remoteRef:
#         key: contract-intel/production
#         property: jwt_secret
---
# Security Context Constraints (more restrictive than default)
# Apply to all pods in namespace
apiVersion: v1
kind: ConfigMap
metadata:
  name: security-context-template
  namespace: contract-intel
data:
  pod-security-context: |
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      seccompProfile:
        type: RuntimeDefault
  container-security-context: |
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL
---
# Secure Application Deployment with all security features
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-secure
  namespace: contract-intel
spec:
  replicas: 3
  selector:
    matchLabels:
      app: contract-intel-app
  template:
    metadata:
      labels:
        app: contract-intel-app
      annotations:
        # Force restart on secret change
        checksum/secrets: "${SECRET_CHECKSUM}"
    spec:
      serviceAccountName: contract-intel-app
      automountServiceAccountToken: false
      
      # Pod Security Context
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      
      # Anti-affinity: spread across nodes
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: contract-intel-app
                topologyKey: kubernetes.io/hostname
      
      containers:
        - name: app
          image: contract-intel-app:latest
          imagePullPolicy: Always
          
          # Container Security Context
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          
          ports:
            - containerPort: 3000
              name: http
          
          # Environment from secrets (not inline)
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          
          # Writable directories (tmpfs)
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /app/.next/cache
          
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          
          # Health checks
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          
          # Startup probe for slow starts
          startupProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 30
      
      # Temporary directories as tmpfs
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: "100Mi"
        - name: cache
          emptyDir:
            medium: Memory
            sizeLimit: "500Mi"
      
      # Termination grace period
      terminationGracePeriodSeconds: 30
---
# PodDisruptionBudget - ensure availability during updates
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: app-pdb
  namespace: contract-intel
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: contract-intel-app
---
# Ingress with security annotations
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: contract-intel-ingress-secure
  namespace: contract-intel
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    
    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
      more_set_headers "Permissions-Policy: camera=(), microphone=(), geolocation=()";
      more_set_headers "Strict-Transport-Security: max-age=31536000; includeSubDomains; preload";
    
    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "50"
    nginx.ingress.kubernetes.io/limit-connections: "10"
    
    # Request size limits
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    
    # Timeouts
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    
    # WebSocket support
    nginx.ingress.kubernetes.io/websocket-services: websocket-service
    
    # ModSecurity WAF (if installed)
    # nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    # nginx.ingress.kubernetes.io/modsecurity-snippet: |
    #   SecRuleEngine On
    #   SecRule ARGS "@detectXSS" "id:1,phase:2,deny,status:403"
spec:
  tls:
    - hosts:
        - contracts.example.com
      secretName: contract-intel-tls
  rules:
    - host: contracts.example.com
      http:
        paths:
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: websocket-service
                port:
                  number: 3001
          - path: /
            pathType: Prefix
            backend:
              service:
                name: app-service
                port:
                  number: 3000
