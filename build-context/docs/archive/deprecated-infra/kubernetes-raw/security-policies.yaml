# ==============================================
# Kubernetes Security Policies
# Enhanced security for production deployments
# ==============================================

---
# Pod Security Standards - Restricted Profile
# Enforces best practices for pod security
apiVersion: v1
kind: Namespace
metadata:
  name: contract-intel
  labels:
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
---
# Service Account with minimal permissions
apiVersion: v1
kind: ServiceAccount
metadata:
  name: contract-intel-app
  namespace: contract-intel
automountServiceAccountToken: false
---
# Role for application with minimal permissions
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: contract-intel-app-role
  namespace: contract-intel
rules:
  # Only allow reading ConfigMaps and Secrets the app needs
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["app-config"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["app-secrets"]
    verbs: ["get"]
---
# RoleBinding for application
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: contract-intel-app-binding
  namespace: contract-intel
subjects:
  - kind: ServiceAccount
    name: contract-intel-app
    namespace: contract-intel
roleRef:
  kind: Role
  name: contract-intel-app-role
  apiGroup: rbac.authorization.k8s.io
---
# Network Policy: Default deny all ingress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: contract-intel
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# Network Policy: Allow app to receive traffic from ingress only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-app-ingress
  namespace: contract-intel
spec:
  podSelector:
    matchLabels:
      app: contract-intel-app
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000
---
# Network Policy: Allow WebSocket from ingress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-websocket-ingress
  namespace: contract-intel
spec:
  podSelector:
    matchLabels:
      app: contract-intel-websocket
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3001
---
# Network Policy: Allow internal pod-to-pod communication
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-internal-communication
  namespace: contract-intel
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}
---
# Network Policy: Allow app to reach external APIs (OpenAI, Azure, etc.)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-external-apis
  namespace: contract-intel
spec:
  podSelector:
    matchLabels:
      app: contract-intel-app
  policyTypes:
    - Egress
  egress:
    # Allow DNS
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow HTTPS to external services
    - to: []
      ports:
        - protocol: TCP
          port: 443
---
# Network Policy: Workers can reach external AI APIs
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-workers-external
  namespace: contract-intel
spec:
  podSelector:
    matchLabels:
      app: contract-intel-workers
  policyTypes:
    - Egress
  egress:
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 443
---
# Network Policy: Postgres only from internal
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-internal-only
  namespace: contract-intel
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - contract-intel-app
                  - contract-intel-workers
      ports:
        - protocol: TCP
          port: 5432
---
# Network Policy: Redis only from internal
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-internal-only
  namespace: contract-intel
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - contract-intel-app
                  - contract-intel-websocket
                  - contract-intel-workers
      ports:
        - protocol: TCP
          port: 6379
---
# Network Policy: MinIO only from internal
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: minio-internal-only
  namespace: contract-intel
spec:
  podSelector:
    matchLabels:
      app: minio
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - contract-intel-app
                  - contract-intel-workers
      ports:
        - protocol: TCP
          port: 9000
---
# LimitRange: Resource constraints per pod
apiVersion: v1
kind: LimitRange
metadata:
  name: resource-limits
  namespace: contract-intel
spec:
  limits:
    - type: Container
      default:
        memory: "512Mi"
        cpu: "500m"
      defaultRequest:
        memory: "128Mi"
        cpu: "100m"
      max:
        memory: "4Gi"
        cpu: "2"
      min:
        memory: "64Mi"
        cpu: "50m"
    - type: PersistentVolumeClaim
      max:
        storage: "100Gi"
      min:
        storage: "1Gi"
---
# ResourceQuota: Namespace resource limits
apiVersion: v1
kind: ResourceQuota
metadata:
  name: namespace-quota
  namespace: contract-intel
spec:
  hard:
    requests.cpu: "10"
    requests.memory: "20Gi"
    limits.cpu: "20"
    limits.memory: "40Gi"
    pods: "50"
    persistentvolumeclaims: "10"
    secrets: "50"
    configmaps: "50"
---
# Secure Secret with encryption hint
# Note: Enable encryption at rest in your cluster:
# --encryption-provider-config=/path/to/encryption-config.yaml
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: contract-intel
  annotations:
    # External Secrets Operator annotation (if using)
    # external-secrets.io/target-name: app-secrets
    # Sealed Secrets annotation (if using)
    # sealedsecrets.bitnami.com/cluster-wide: "true"
type: Opaque
# In production, use External Secrets Operator or Sealed Secrets
# Do NOT put actual values here - use CI/CD to inject
stringData:
  DATABASE_URL: "${DATABASE_URL}"
  REDIS_URL: "${REDIS_URL}"
  JWT_SECRET: "${JWT_SECRET}"
  OPENAI_API_KEY: "${OPENAI_API_KEY}"
  ENCRYPTION_KEY: "${ENCRYPTION_KEY}"
  MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY}"
  MINIO_SECRET_KEY: "${MINIO_SECRET_KEY}"
---
# External Secrets Operator - SecretStore (for AWS Secrets Manager)
# Uncomment if using AWS Secrets Manager
# apiVersion: external-secrets.io/v1beta1
# kind: SecretStore
# metadata:
#   name: aws-secrets-store
#   namespace: contract-intel
# spec:
#   provider:
#     aws:
#       service: SecretsManager
#       region: eu-central-1  # Swiss-compatible EU region
#       auth:
#         jwt:
#           serviceAccountRef:
#             name: contract-intel-app
---
# External Secrets Operator - ExternalSecret (for AWS)
# Uncomment if using AWS Secrets Manager
# apiVersion: external-secrets.io/v1beta1
# kind: ExternalSecret
# metadata:
#   name: app-secrets-external
#   namespace: contract-intel
