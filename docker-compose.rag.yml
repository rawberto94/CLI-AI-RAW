# Docker Compose for RAG System
# Run with: docker-compose -f docker-compose.rag.yml up -d

version: '3.8'

services:
  # Chroma Vector Database
  chroma:
    image: chromadb/chroma:latest
    container_name: contract-intelligence-chroma
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v2/heartbeat')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  chroma-data:
    driver: local
