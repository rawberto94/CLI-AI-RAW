<svg width="200" height="60" viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Three Stacked Bars Icon -->
  <g transform="translate(0, 12)">
    <!-- Top Bar -->
    <rect x="0" y="0" width="28" height="8" rx="4" fill="#7C3AED"/>
    <!-- Middle Bar -->
    <rect x="0" y="14" width="28" height="8" rx="4" fill="#8B5CF6"/>
    <!-- Bottom Bar -->
    <rect x="0" y="28" width="28" height="8" rx="4" fill="#A78BFA"/>
  </g>
  
  <!-- Text: "contigo" -->
  <text x="40" y="42" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" letter-spacing="-0.5">
    <tspan fill="#7C3AED">con</tspan><tspan fill="#1F2937">tigo</tspan>
  </text>
</svg>
