openapi: 3.0.3
info:
  title: Contract Intelligence API
  description: |
    Comprehensive API for contract management, analysis, and intelligence.
    
    ## Features
    - Contract upload and processing
    - Real-time analysis and insights
    - Cross-contract relationship discovery
    - Advanced search and filtering
    - Processing status monitoring
    - Comprehensive reporting
    
    ## Authentication
    All endpoints require authentication via JWT tokens or API keys.
    Include the token in the Authorization header: `Bearer <token>`
    
    ## Rate Limiting
    API requests are rate limited to 1000 requests per hour per API key.
    
  version: 1.0.0
  contact:
    name: API Support
    email: api-support@contractintelligence.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://api.contractintelligence.com/v1
    description: Production server
  - url: https://staging-api.contractintelligence.com/v1
    description: Staging server
  - url: http://localhost:3001/api
    description: Development server

security:
  - BearerAuth: []
  - ApiKeyAuth: []

paths:
  /health:
    get:
      summary: Health check
      description: Check API health status
      tags:
        - System
      security: []
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy
                  timestamp:
                    type: string
                    format: date-time
                  version:
                    type: string
                    example: 1.0.0

  /contracts:
    get:
      summary: List contracts
      description: Retrieve a paginated list of contracts
      tags:
        - Contracts
      parameters:
        - name: limit
          in: query
          description: Number of contracts to return
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: offset
          in: query
          description: Number of contracts to skip
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: status
          in: query
          description: Filter by contract status
          schema:
            type: string
            enum: [UPLOADED, PROCESSING, COMPLETED, FAILED]
        - name: contractType
          in: query
          description: Filter by contract type
          schema:
            type: string
        - name: q
          in: query
          description: Search query
          schema:
            type: string
      responses:
        '200':
          description: List of contracts
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Contract'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

    post:
      summary: Create contract
      description: Upload and create a new contract
      tags:
        - Contracts
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: Contract file (PDF, DOC, DOCX, TXT)
                metadata:
                  type: object
                  properties:
                    filename:
                      type: string
                    description:
                      type: string
                    tags:
                      type: array
                      items:
                        type: string
              required:
                - file
      responses:
        '201':
          description: Contract created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Contract'
                  processingJobId:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '413':
          description: File too large
        '500':
          $ref: '#/components/responses/InternalError'

  /contracts/{contractId}:
    get:
      summary: Get contract
      description: Retrieve a specific contract by ID
      tags:
        - Contracts
      parameters:
        - name: contractId
          in: path
          required: true
          schema:
            type: string
        - name: includeAnalysis
          in: query
          description: Include analysis results
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Contract details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/ContractWithAnalysis'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

    put:
      summary: Update contract
      description: Update contract metadata
      tags:
        - Contracts
      parameters:
        - name: contractId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                filename:
                  type: string
                description:
                  type: string
                tags:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Contract updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Contract'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

    delete:
      summary: Delete contract
      description: Delete a contract and all associated data
      tags:
        - Contracts
      parameters:
        - name: contractId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Contract deleted successfully
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /contracts/{contractId}/analysis:
    get:
      summary: Get contract analysis
      description: Retrieve analysis results for a contract
      tags:
        - Analysis
      parameters:
        - name: contractId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Contract analysis results
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/ContractAnalysis'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /processing-status:
    get:
      summary: Get processing status
      description: Retrieve processing job status and worker information
      tags:
        - Processing
      parameters:
        - name: type
          in: query
          description: Type of status information to retrieve
          schema:
            type: string
            enum: [all, jobs, workers, metrics]
            default: all
      responses:
        '200':
          description: Processing status information
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    oneOf:
                      - $ref: '#/components/schemas/ProcessingStatus'
                      - type: array
                        items:
                          $ref: '#/components/schemas/ProcessingJob'
                      - type: array
                        items:
                          $ref: '#/components/schemas/WorkerStatus'
                      - $ref: '#/components/schemas/SystemMetrics'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /cross-contract-analysis/relationships:
    get:
      summary: Get contract relationships
      description: Discover relationships between contracts
      tags:
        - Cross-Contract Analysis
      parameters:
        - name: contractIds
          in: query
          description: Specific contract IDs to analyze (optional)
          schema:
            type: array
            items:
              type: string
          style: form
          explode: false
      responses:
        '200':
          description: Contract relationships
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ContractRelationship'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /cross-contract-analysis/clusters:
    get:
      summary: Get contract clusters
      description: Identify similar contracts and group them into clusters
      tags:
        - Cross-Contract Analysis
      parameters:
        - name: similarityThreshold
          in: query
          description: Similarity threshold for clustering (0.0-1.0)
          schema:
            type: number
            minimum: 0
            maximum: 1
            default: 0.7
      responses:
        '200':
          description: Contract clusters
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ContractCluster'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /cross-contract-analysis/insights:
    get:
      summary: Get cross-contract insights
      description: Generate insights from cross-contract analysis
      tags:
        - Cross-Contract Analysis
      responses:
        '200':
          description: Cross-contract insights
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CrossContractInsight'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /search:
    get:
      summary: Search contracts
      description: Perform semantic search across contracts
      tags:
        - Search
      parameters:
        - name: q
          in: query
          required: true
          description: Search query
          schema:
            type: string
        - name: limit
          in: query
          description: Number of results to return
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: filters
          in: query
          description: Additional filters
          schema:
            type: object
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      contracts:
                        type: array
                        items:
                          $ref: '#/components/schemas/Contract'
                      total:
                        type: integer
                      hasMore:
                        type: boolean
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

  schemas:
    Contract:
      type: object
      properties:
        id:
          type: string
          example: contract_123
        tenantId:
          type: string
          example: tenant_456
        filename:
          type: string
          example: service-agreement.pdf
        status:
          type: string
          enum: [UPLOADED, PROCESSING, COMPLETED, FAILED]
        uploadedAt:
          type: string
          format: date-time
        processedAt:
          type: string
          format: date-time
        uploadedBy:
          type: string
          example: user@company.com
        metadata:
          type: object
          properties:
            fileSize:
              type: integer
            mimeType:
              type: string
            wordCount:
              type: integer
            pageCount:
              type: integer

    ContractWithAnalysis:
      allOf:
        - $ref: '#/components/schemas/Contract'
        - type: object
          properties:
            analysis:
              $ref: '#/components/schemas/ContractAnalysis'

    ContractAnalysis:
      type: object
      properties:
        contractId:
          type: string
        financial:
          type: object
          properties:
            totalValue:
              type: number
            currency:
              type: string
            paymentTerms:
              type: string
            paymentSchedule:
              type: object
        risk:
          type: object
          properties:
            riskScore:
              type: number
              minimum: 0
              maximum: 100
            riskLevel:
              type: string
              enum: [LOW, MEDIUM, HIGH]
            riskFactors:
              type: array
              items:
                type: object
        compliance:
          type: object
          properties:
            complianceScore:
              type: number
              minimum: 0
              maximum: 100
            complianceLevel:
              type: string
              enum: [EXCELLENT, GOOD, FAIR, POOR]
            regulations:
              type: array
              items:
                type: object
        clauses:
          type: object
          properties:
            clauses:
              type: array
              items:
                type: object
            completeness:
              type: object
        analyzedAt:
          type: string
          format: date-time

    ProcessingJob:
      type: object
      properties:
        id:
          type: string
        contractId:
          type: string
        filename:
          type: string
        status:
          type: string
          enum: [queued, processing, completed, failed, paused]
        currentStage:
          type: string
        totalProgress:
          type: number
          minimum: 0
          maximum: 100
        startTime:
          type: string
          format: date-time
        estimatedCompletion:
          type: string
          format: date-time
        stages:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              name:
                type: string
              status:
                type: string
                enum: [pending, running, completed, failed]
              progress:
                type: number
                minimum: 0
                maximum: 100

    WorkerStatus:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
          enum: [active, idle, error, offline]
        currentJob:
          type: string
        processedJobs:
          type: integer
        averageProcessingTime:
          type: number
        lastActivity:
          type: string
          format: date-time
        cpuUsage:
          type: number
          minimum: 0
          maximum: 100
        memoryUsage:
          type: number
          minimum: 0
          maximum: 100

    SystemMetrics:
      type: object
      properties:
        totalJobs:
          type: integer
        activeJobs:
          type: integer
        completedJobs:
          type: integer
        failedJobs:
          type: integer
        averageProcessingTime:
          type: number
        throughput:
          type: number
        queueDepth:
          type: integer
        systemLoad:
          type: number
          minimum: 0
          maximum: 100

    ProcessingStatus:
      type: object
      properties:
        jobs:
          type: array
          items:
            $ref: '#/components/schemas/ProcessingJob'
        workers:
          type: array
          items:
            $ref: '#/components/schemas/WorkerStatus'
        metrics:
          $ref: '#/components/schemas/SystemMetrics'

    ContractRelationship:
      type: object
      properties:
        contractId1:
          type: string
        contractId2:
          type: string
        relationshipType:
          type: string
          enum: [SIMILAR, DEPENDENT, CONFLICTING, COMPLEMENTARY, RENEWAL, AMENDMENT]
        confidence:
          type: number
          minimum: 0
          maximum: 1
        description:
          type: string
        commonElements:
          type: array
          items:
            type: string
        differences:
          type: array
          items:
            type: string
        riskFactors:
          type: array
          items:
            type: string

    ContractCluster:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        contractIds:
          type: array
          items:
            type: string
        commonCharacteristics:
          type: array
          items:
            type: string
        averageValue:
          type: number
        riskLevel:
          type: string
          enum: [LOW, MEDIUM, HIGH]
        complianceScore:
          type: number
          minimum: 0
          maximum: 100

    CrossContractInsight:
      type: object
      properties:
        type:
          type: string
          enum: [PATTERN, ANOMALY, OPPORTUNITY, RISK]
        title:
          type: string
        description:
          type: string
        affectedContracts:
          type: array
          items:
            type: string
        severity:
          type: string
          enum: [LOW, MEDIUM, HIGH, CRITICAL]
        recommendation:
          type: string
        potentialImpact:
          type: string

    Pagination:
      type: object
      properties:
        limit:
          type: integer
        offset:
          type: integer
        total:
          type: integer
        hasMore:
          type: boolean

    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
        details:
          type: string
        code:
          type: string
        timestamp:
          type: string
          format: date-time

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            success: false
            error: Invalid request parameters
            code: BAD_REQUEST
            timestamp: "2024-01-10T10:00:00Z"

    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            success: false
            error: Authentication required
            code: UNAUTHORIZED
            timestamp: "2024-01-10T10:00:00Z"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            success: false
            error: Resource not found
            code: NOT_FOUND
            timestamp: "2024-01-10T10:00:00Z"

    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            success: false
            error: Internal server error
            code: INTERNAL_ERROR
            timestamp: "2024-01-10T10:00:00Z"

tags:
  - name: System
    description: System health and status endpoints
  - name: Contracts
    description: Contract management operations
  - name: Analysis
    description: Contract analysis and insights
  - name: Processing
    description: Processing status and monitoring
  - name: Cross-Contract Analysis
    description: Cross-contract relationship and pattern analysis
  - name: Search
    description: Contract search and discovery