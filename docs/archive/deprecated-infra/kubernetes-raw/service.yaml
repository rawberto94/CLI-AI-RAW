# ==============================================
# Services for ConTigo Platform
# ==============================================
apiVersion: v1
kind: Service
metadata:
  name: contigo-web
  namespace: contigo
  labels:
    app.kubernetes.io/name: contigo
    app.kubernetes.io/component: web
spec:
  type: LoadBalancer
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP
  selector:
    app: contigo-web
---
apiVersion: v1
kind: Service
metadata:
  name: contigo-web-internal
  namespace: contigo
  labels:
    app.kubernetes.io/name: contigo
    app.kubernetes.io/component: web
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
  selector:
    app: contigo-web
---
apiVersion: v1
kind: Service
metadata:
  name: contigo-websocket
  namespace: contigo
  labels:
    app.kubernetes.io/name: contigo
    app.kubernetes.io/component: websocket
spec:
  type: ClusterIP
  ports:
    - name: ws
      port: 3001
      targetPort: 3001
      protocol: TCP
  selector:
    app: contigo-websocket
---
# Headless service for workers (no load balancing needed)
apiVersion: v1
kind: Service
metadata:
  name: contigo-workers
  namespace: contigo
  labels:
    app.kubernetes.io/name: contigo
    app.kubernetes.io/component: workers
spec:
  clusterIP: None
  selector:
    app: contigo-workers
