version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: pgvector/pgvector:pg16
    container_name: contract-intelligence-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: contract_intelligence
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init/01-enable-extensions.sql:/docker-entrypoint-initdb.d/01-enable-extensions.sql
    # Port exposed only to internal network (use pgbouncer externally)
    expose:
      - "5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d contract_intelligence" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - contract-intelligence

  # PgBouncer Connection Pooler - Recommended for production
  pgbouncer:
    image: edoburu/pgbouncer:1.21.0
    container_name: contract-intelligence-pgbouncer
    restart: unless-stopped
    environment:
      # Database configuration
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/contract_intelligence
      # PgBouncer settings - transaction pooling for best performance
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 50
      MIN_POOL_SIZE: 10
      RESERVE_POOL_SIZE: 25
      RESERVE_POOL_TIMEOUT: 5
      MAX_DB_CONNECTIONS: 100
      MAX_USER_CONNECTIONS: 100
      # Authentication
      AUTH_TYPE: scram-sha-256
      AUTH_FILE: /etc/pgbouncer/userlist.txt
      # Logging
      LOG_CONNECTIONS: 1
      LOG_DISCONNECTIONS: 1
      LOG_POOLER_ERRORS: 1
      # Timeouts
      SERVER_IDLE_TIMEOUT: 600
      SERVER_LIFETIME: 3600
      SERVER_CONNECT_TIMEOUT: 15
      CLIENT_IDLE_TIMEOUT: 0
      CLIENT_LOGIN_TIMEOUT: 60
      QUERY_TIMEOUT: 0
      QUERY_WAIT_TIMEOUT: 120
      # Admin settings
      ADMIN_USERS: postgres
      STATS_USERS: postgres
    volumes:
      - ./pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    ports:
      - "5432:5432"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "pg_isready", "-h", "localhost", "-p", "5432" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - contract-intelligence

  # Redis for BullMQ
  redis:
    image: redis:7-alpine
    container_name: contract-intelligence-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - contract-intelligence

  # MinIO for S3-compatible storage
  minio:
    image: minio/minio:latest
    container_name: contract-intelligence-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:?S3_ACCESS_KEY must be set}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?S3_SECRET_KEY must be set}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - contract-intelligence

  # API Server
  api:
    image: contract-intelligence/api:${VERSION:-latest}
    container_name: contract-intelligence-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8080
      # Use pgbouncer for connection pooling in production
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-postgres}@pgbouncer:5432/contract_intelligence
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-contracts}
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY:-minioadmin}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      ANALYSIS_USE_LLM: ${ANALYSIS_USE_LLM:-true}
      RAG_ENABLED: ${RAG_ENABLED:-true}
      JWT_SECRET: ${JWT_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SENTRY_DSN: ${SENTRY_DSN:-}
    ports:
      - "8080:8080"
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/healthz" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - contract-intelligence
    volumes:
      - app_logs:/app/logs

  # Background workers (scaled for bulk processing)
  workers:
    image: ${WORKERS_IMAGE:-ghcr.io/yourorg/cli-ai-raw/workers:latest}
    # Note: container_name removed to allow replicas scaling
    restart: unless-stopped
    deploy:
      replicas: ${WORKER_REPLICAS:-3}
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G
    environment:
      NODE_ENV: production

      # Database - Use pgbouncer for connection pooling
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-postgres}@pgbouncer:5432/contract_intelligence

      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379

      # OpenAI
      OPENAI_API_KEY: ${OPENAI_API_KEY}

      # Azure Document Intelligence v4.0
      AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT: ${AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT:-}
      AZURE_DOCUMENT_INTELLIGENCE_KEY: ${AZURE_DOCUMENT_INTELLIGENCE_KEY:-}
      AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT_EU: ${AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT_EU:-}
      AZURE_DOCUMENT_INTELLIGENCE_KEY_EU: ${AZURE_DOCUMENT_INTELLIGENCE_KEY_EU:-}
      AZURE_DI_DEFAULT_MODEL: ${AZURE_DI_DEFAULT_MODEL:-layout}
      AZURE_DI_FEATURES: ${AZURE_DI_FEATURES:-keyValuePairs}

      # Features
      RAG_INTEGRATION_ENABLED: ${RAG_ENABLED:-false}

      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - contract-intelligence
    volumes:
      - app_logs:/app/logs

  # Web Frontend
  web:
    image: ${WEB_IMAGE:-ghcr.io/yourorg/cli-ai-raw/web:latest}
    container_name: contract-intelligence-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000

      # Database - Use pgbouncer for connection pooling
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-postgres}@pgbouncer:5432/contract_intelligence
      # Direct connection (bypasses PgBouncer) for migrations & interactive transactions
      DIRECT_DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/contract_intelligence

      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379

      # MinIO
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${S3_BUCKET:-contracts}
      MINIO_USE_SSL: "false"

      # NextAuth
      AUTH_SECRET: ${AUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}

      # OpenAI
      OPENAI_API_KEY: ${OPENAI_API_KEY}

      # Azure Document Intelligence v4.0
      AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT: ${AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT:-}
      AZURE_DOCUMENT_INTELLIGENCE_KEY: ${AZURE_DOCUMENT_INTELLIGENCE_KEY:-}
      AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT_EU: ${AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT_EU:-}
      AZURE_DOCUMENT_INTELLIGENCE_KEY_EU: ${AZURE_DOCUMENT_INTELLIGENCE_KEY_EU:-}
      AZURE_DI_DEFAULT_MODEL: ${AZURE_DI_DEFAULT_MODEL:-layout}
      AZURE_DI_FEATURES: ${AZURE_DI_FEATURES:-keyValuePairs}

      # Features
      RAG_INTEGRATION_ENABLED: ${RAG_ENABLED:-false}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - contract-intelligence

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: contract-intelligence-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
      - web
    networks:
      - contract-intelligence
    profiles:
      - nginx

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  app_logs:
    driver: local
  nginx_logs:
    driver: local

networks:
  contract-intelligence:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
